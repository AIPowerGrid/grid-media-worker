name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]" || pip install -e . pytest pytest-asyncio

      - name: Reject retired transports
        shell: bash
        run: |
          if git grep -nEi 'AI[ -]?Horde|/api/v2|/v2/generate|GRID_WS=' -- . \
            ':(exclude).github/workflows/test.yml'; then
            echo "::error::retired transport reference found above"
            exit 1
          fi

      - name: Run test suite
        run: pytest tests/ -v --tb=short
