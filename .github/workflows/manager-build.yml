name: manager-build

on:
  workflow_dispatch:
  push:
    tags:
      - "manager-v*"
  pull_request:
    paths:
      - "bridge/**"
      - "tests/**"
      - "manager_entry.py"
      - "profile_release.py"
      - "grid-media-manager.spec"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/manager-build.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: grid-media-manager-linux-x86_64
            executable: dist/grid-media-manager
            release_file: dist/grid-media-manager-linux-x86_64
          - os: windows-2022
            artifact: grid-media-manager-windows-x86_64
            executable: dist/grid-media-manager.exe
            release_file: dist/grid-media-manager-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y binutils
      - name: Build standalone manager
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'uv==0.11.28'
          uv sync --frozen --extra test --extra release
          uv run --frozen --extra test --extra release pytest -q
          uv run --frozen --extra test --extra release pyinstaller --clean --noconfirm grid-media-manager.spec
      - name: Smoke-test bundled command and profile
        shell: bash
        run: |
          "${{ matrix.executable }}" --help
          "${{ matrix.executable }}" setup --help
          "${{ matrix.executable }}" --allow-unsigned-draft recommend --help
          "${{ matrix.executable }}" --allow-unsigned-draft benchmark --help
          "${{ matrix.executable }}" --allow-unsigned-draft inspect > manager-inspect.json
          python - <<'PY'
          import json

          result = json.load(open("manager-inspect.json", encoding="utf-8"))
          assert result["runtime_tools"]["uv"] is True
          assert result["runtime_tools"]["git"] is True
          PY
          tmpdir="$(mktemp -d)"
          "${{ matrix.executable }}" identity \
            --key "$tmpdir/worker-key.json" \
            --delegation "$tmpdir/delegation.json" \
            generate
          "${{ matrix.executable }}" identity \
            --key "$tmpdir/worker-key.json" \
            --delegation "$tmpdir/delegation.json" \
            show
          rm -rf "$tmpdir"
      - name: Verify public runtime bundle boundary
        shell: bash
        run: |
          uv run --frozen --extra release pyi-archive_viewer \
            -l "${{ matrix.executable }}" > manager-archive.txt
          if grep -Eiq '(^|[[:space:]/._-])(tkinter|_tkinter|tcl8|tk8)([[:space:]/._-]|$)' manager-archive.txt; then
            echo "Tk payload unexpectedly present in the manager bundle" >&2
            exit 1
          fi
          if grep -Eq 'bridge([./])profiles([./])(release|qualification)|profile_release' manager-archive.txt; then
            echo "Offline release tooling unexpectedly present in the manager bundle" >&2
            exit 1
          fi
      - name: Stage release filename and checksum
        shell: bash
        run: |
          cp "${{ matrix.executable }}" "${{ matrix.release_file }}"
          python - "${{ matrix.release_file }}" "${{ matrix.release_file }}.sha256" <<'PY'
          import hashlib
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          checksum = pathlib.Path(sys.argv[2])
          checksum.write_bytes(
              f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n".encode("ascii")
          )
          PY
      - name: Attest tagged release binary
        if: startsWith(github.ref, 'refs/tags/manager-v')
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: ${{ matrix.release_file }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.release_file }}
            ${{ matrix.release_file }}.sha256
          if-no-files-found: error

  assemble-draft-release:
    if: startsWith(github.ref, 'refs/tags/manager-v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: grid-media-manager-*
          path: release-assets
          merge-multiple: true
      - name: Require a release-qualified signed profile
        shell: bash
        run: |
          chmod +x release-assets/grid-media-manager-linux-x86_64
          release-assets/grid-media-manager-linux-x86_64 inspect > release-assets/manager-inspect.json
          python - <<'PY'
          import json

          result = json.load(open("release-assets/manager-inspect.json", encoding="utf-8"))
          assert result["status"] == "active", "tagged release profile is not active"
          assert result["signature_verified"] is True, "tagged release profile is not signed"
          assert result["signing_key_id"], "tagged release has no signing key ID"
          assert result["recipe_onchain_root"], "tagged release has no RecipeVault root"
          assert result["qualification_manifest_sha256"], "tagged release is not hardware-qualified"
          PY
      - name: Build release manifest and aggregate checksums
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib

          root = pathlib.Path("release-assets")
          inspect = json.loads((root / "manager-inspect.json").read_text(encoding="utf-8"))
          names = [
              "grid-media-manager-linux-x86_64",
              "grid-media-manager-windows-x86_64.exe",
          ]
          assets = []
          checksum_lines = []
          for name in names:
              path = root / name
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              assets.append({"name": name, "sha256": digest, "bytes": path.stat().st_size})
              checksum_lines.append(f"{digest}  {name}")
          manifest = {
              "schema": "aipg-manager-release-v1",
              "tag": os.environ["RELEASE_TAG"],
              "commit": os.environ["RELEASE_COMMIT"],
              "profile": inspect,
              "assets": assets,
          }
          (root / "manager-release.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          (root / "SHA256SUMS").write_text("\n".join(checksum_lines) + "\n", encoding="ascii")
          PY
      - name: Attest assembled release assets
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: |
            release-assets/grid-media-manager-linux-x86_64
            release-assets/grid-media-manager-windows-x86_64.exe
            release-assets/manager-release.json
            release-assets/SHA256SUMS
      - name: Create or refresh draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          assets=(
            release-assets/grid-media-manager-linux-x86_64
            release-assets/grid-media-manager-windows-x86_64.exe
            release-assets/manager-release.json
            release-assets/SHA256SUMS
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            [ "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" = "true" ] || {
              echo "Refusing to overwrite an already-published release" >&2
              exit 1
            }
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --draft \
              --verify-tag \
              --title "Grid Media Manager ${RELEASE_TAG#manager-v}" \
              --notes "Draft only: publish after hardware qualification, Windows code signing, and supervised staging validation."
          fi
